<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR 시뮬레이터</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --surface2: #f0f0ed;
      --border: rgba(0,0,0,0.09);
      --text: #1a1a18;
      --text2: #6b6b67;
      --text3: #9e9e9a;
      --accent: #1a56db;
      --accent-bg: #eff4ff;
      --radius: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161614;
        --surface: #1f1f1d;
        --surface2: #2a2a27;
        --border: rgba(255,255,255,0.08);
        --text: #f0f0ec;
        --text2: #9a9a96;
        --text3: #636360;
        --accent: #5b8ef5;
        --accent-bg: #1a2340;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem 5rem;
    }

    .shell { width: 100%; max-width: 560px; }

    header { margin-bottom: 2.5rem; }
    header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.4px; }
    header p  { font-size: 14px; color: var(--text2); margin-top: 6px; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text3);
      margin-bottom: 10px;
    }

    .card-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 2rem; }

    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, transform 0.12s;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transform: translateY(-1px);
    }

    .card:active { transform: scale(0.99); }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
    }

    .card-icon.blue   { background: var(--accent-bg); }
    .card-icon.green  { background: #ecfdf5; }
    .card-icon.purple { background: #f5f3ff; }

    .card-body { flex: 1; }
    .card-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    .card-desc  { font-size: 13px; color: var(--text2); margin-top: 3px; }
    .card-arrow { color: var(--text3); font-size: 20px; flex-shrink: 0; }

    .card.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 500;
      margin-left: 6px;
      vertical-align: middle;
      background: var(--surface2);
      color: var(--text3);
    }

    footer {
      margin-top: 0.5rem;
      font-size: 12px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>HR 시뮬레이터</h1>
      <p>보상 관련 시뮬레이션 도구 모음입니다.</p>
    </header>

    <p class="section-label">사용 가능</p>
    <div class="card-list">
      <a class="card" href="salary.html">
        <div class="card-icon blue">💰</div>
        <div class="card-body">
          <div class="card-title">연봉 인상 시뮬레이터</div>
          <div class="card-desc">현재 연봉과 인상률로 인상 후 연봉 계산</div>
        </div>
        <div class="card-arrow">›</div>
      </a>
    </div>

    <p class="section-label">준비 중</p>
    <div class="card-list">
      <div class="card disabled">
        <div class="card-icon green">🎯</div>
        <div class="card-body">
          <div class="card-title">성과급 시뮬레이터 <span class="badge">준비 중</span></div>
          <div class="card-desc">성과 등급별 성과급 금액 계산</div>
        </div>
        <div class="card-arrow">›</div>
      </div>
      <div class="card disabled">
        <div class="card-icon purple">📊</div>
        <div class="card-body">
          <div class="card-title">총보상 시뮬레이터 <span class="badge">준비 중</span></div>
          <div class="card-desc">연봉 · 성과급 · 복리후생을 합산한 총보상 계산</div>
        </div>
        <div class="card-arrow">›</div>
      </div>
    </div>

    <footer>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      모든 데이터는 브라우저 로컬에만 저장되며 외부로 전송되지 않습니다.
    </footer>
  </div>
</body>
</html>
