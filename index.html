<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연봉 인상 시뮬레이터</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --surface2: #f2f2ef;
      --border: rgba(0,0,0,0.10);
      --border2: rgba(0,0,0,0.18);
      --text: #1a1a18;
      --text2: #6b6b67;
      --text3: #9e9e9a;
      --accent: #1a56db;
      --accent-bg: #eff4ff;
      --accent-text: #1a56db;
      --radius: 10px;
      --radius-sm: 6px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161614;
        --surface: #1f1f1d;
        --surface2: #2a2a27;
        --border: rgba(255,255,255,0.09);
        --border2: rgba(255,255,255,0.16);
        --text: #f0f0ec;
        --text2: #9a9a96;
        --text3: #636360;
        --accent: #5b8ef5;
        --accent-bg: #1a2340;
        --accent-text: #7aaaf8;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }

    .app-shell {
      width: 100%;
      max-width: 560px;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    header p {
      font-size: 14px;
      color: var(--text2);
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text3);
      margin-bottom: 1rem;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .input-addon {
      display: flex;
      align-items: center;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--surface);
      transition: border-color 0.15s;
    }

    .input-addon:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26,86,219,0.12);
    }

    .input-addon .unit {
      padding: 0 10px;
      font-size: 13px;
      color: var(--text3);
      background: var(--surface2);
      border-right: 0.5px solid var(--border);
      height: 38px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .input-addon .unit.suffix {
      border-right: none;
      border-left: 0.5px solid var(--border);
    }

    .input-addon input {
      border: none;
      outline: none;
      background: transparent;
      padding: 0 10px;
      height: 38px;
      font-size: 14px;
      color: var(--text);
      width: 100%;
      font-family: inherit;
    }

    .input-addon input::placeholder { color: var(--text3); }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .metric {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
    }

    .metric.accent {
      background: var(--accent-bg);
    }

    .metric .m-label {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 6px;
    }

    .metric.accent .m-label { color: var(--accent-text); opacity: 0.7; }

    .metric .m-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .metric.accent .m-value { color: var(--accent-text); }

    .metric .m-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 3px;
    }

    .metric.accent .m-sub { color: var(--accent-text); opacity: 0.6; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 1rem;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      height: 36px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }

    button:hover { background: var(--surface2); color: var(--text); }
    button:active { transform: scale(0.98); }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    button.primary:hover { opacity: 0.88; }

    .history-empty {
      font-size: 13px;
      color: var(--text3);
      text-align: center;
      padding: 1.5rem 0;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
    }

    .history-item:last-child { border-bottom: none; }

    .h-left .h-date { font-size: 12px; color: var(--text3); }
    .h-left .h-formula { font-size: 13px; color: var(--text2); margin-top: 2px; }

    .h-right {
      text-align: right;
    }

    .h-right .h-result { font-size: 15px; font-weight: 600; color: var(--text); }
    .h-right .h-delta { font-size: 12px; color: var(--accent-text); margin-top: 2px; }

    .notice {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      font-size: 12px;
      color: var(--text3);
      margin-top: 0.75rem;
      line-height: 1.6;
    }

    .notice svg { flex-shrink: 0; margin-top: 1px; }

    hr.divider {
      border: none;
      border-top: 0.5px solid var(--border);
      margin: 1.25rem 0;
    }

    @media (max-width: 420px) {
      .result-grid { grid-template-columns: 1fr 1fr; }
      .metric.accent { grid-column: 1 / -1; }
      .input-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>연봉 인상 시뮬레이터</h1>
      <p>현재 연봉과 인상률을 입력하면 결과를 즉시 계산합니다.</p>
    </header>

    <div class="card">
      <div class="card-title">입력</div>
      <div class="input-grid">
        <div class="input-group">
          <label for="salary">현재 연봉</label>
          <div class="input-addon">
            <input type="number" id="salary" placeholder="60,000,000" min="0" step="1000000" />
            <span class="unit suffix">원</span>
          </div>
        </div>
        <div class="input-group">
          <label for="rate">인상률</label>
          <div class="input-addon">
            <input type="number" id="rate" placeholder="5.0" min="0" max="100" step="0.1" />
            <span class="unit suffix">%</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">결과</div>
      <div class="result-grid">
        <div class="metric">
          <div class="m-label">현재 연봉</div>
          <div class="m-value" id="r-current">—</div>
          <div class="m-sub">연 기준</div>
        </div>
        <div class="metric">
          <div class="m-label">인상액</div>
          <div class="m-value" id="r-delta">—</div>
          <div class="m-sub">월 <span id="r-delta-m">—</span></div>
        </div>
        <div class="metric accent">
          <div class="m-label">인상 후 연봉</div>
          <div class="m-value" id="r-new">—</div>
          <div class="m-sub">월 <span id="r-new-m">—</span></div>
        </div>
      </div>

      <div class="btn-row">
        <button class="primary" onclick="saveRecord()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          이력 저장
        </button>
        <button onclick="resetInputs()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.55"/></svg>
          초기화
        </button>
      </div>

      <div class="notice">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        모든 데이터는 이 브라우저의 로컬 저장소(localStorage)에만 저장되며, 외부로 전송되지 않습니다.
      </div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 0.75rem;">
        <div class="card-title" style="margin-bottom:0;">시뮬레이션 이력</div>
        <button onclick="clearHistory()" style="height:28px; font-size:12px; padding: 0 10px; color: var(--text3);">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          전체 삭제
        </button>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <script>
    const fmt = v => Math.round(v).toLocaleString('ko-KR');
    const fmtM = v => Math.round(v / 12).toLocaleString('ko-KR');

    function calc() {
      const s = parseFloat(document.getElementById('salary').value);
      const r = parseFloat(document.getElementById('rate').value);

      if (!s || isNaN(s) || !r || isNaN(r) || s <= 0 || r <= 0) {
        document.getElementById('r-current').textContent = '—';
        document.getElementById('r-delta').textContent = '—';
        document.getElementById('r-new').textContent = '—';
        document.getElementById('r-delta-m').textContent = '—';
        document.getElementById('r-new-m').textContent = '—';
        return;
      }

      const newSal = s * (1 + r / 100);
      const delta = newSal - s;

      document.getElementById('r-current').textContent = fmt(s) + '원';
      document.getElementById('r-delta').textContent = '+' + fmt(delta) + '원';
      document.getElementById('r-delta-m').textContent = '+' + fmtM(delta) + '원';
      document.getElementById('r-new').textContent = fmt(newSal) + '원';
      document.getElementById('r-new-m').textContent = fmtM(newSal) + '원';
    }

    function resetInputs() {
      document.getElementById('salary').value = '';
      document.getElementById('rate').value = '';
      calc();
    }

    function saveRecord() {
      const s = parseFloat(document.getElementById('salary').value);
      const r = parseFloat(document.getElementById('rate').value);
      if (!s || isNaN(s) || !r || isNaN(r) || s <= 0 || r <= 0) {
        alert('현재 연봉과 인상률을 먼저 입력해주세요.');
        return;
      }
      const newSal = s * (1 + r / 100);
      const delta = newSal - s;
      const records = JSON.parse(localStorage.getItem('salary_sim_v1') || '[]');
      records.unshift({ s, r, newSal, delta, ts: Date.now() });
      if (records.length > 30) records.pop();
      localStorage.setItem('salary_sim_v1', JSON.stringify(records));
      renderHistory();
    }

    function clearHistory() {
      if (!confirm('이력을 모두 삭제할까요?')) return;
      localStorage.removeItem('salary_sim_v1');
      renderHistory();
    }

    function renderHistory() {
      const el = document.getElementById('history-list');
      const records = JSON.parse(localStorage.getItem('salary_sim_v1') || '[]');
      if (!records.length) {
        el.innerHTML = '<div class="history-empty">저장된 이력이 없습니다.</div>';
        return;
      }
      el.innerHTML = records.map(rec => {
        const d = new Date(rec.ts);
        const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        return `<div class="history-item">
          <div class="h-left">
            <div class="h-date">${dateStr}</div>
            <div class="h-formula">${fmt(rec.s)}원 × ${rec.r}% 인상</div>
          </div>
          <div class="h-right">
            <div class="h-result">${fmt(rec.newSal)}원</div>
            <div class="h-delta">+${fmt(rec.delta)}원</div>
          </div>
        </div>`;
      }).join('');
    }

    document.getElementById('salary').addEventListener('input', calc);
    document.getElementById('rate').addEventListener('input', calc);
    renderHistory();
  </script>
</body>
</html>
